name: CI

on:
  push:
    branches: [master, develop]
    paths:
      - "Backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "Backend/**"

defaults:
  run:
    working-directory: Backend

jobs:
  ci:
    name: Test & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: somos-barrio
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/somos-barrio?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_secret_for_testing_that_is_long_enough
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_DAYS: 30
      # Cloudinary (CI usa variables de entorno del repositorio)
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npm run typecheck

      - name: Apply migrations (main DB)
        run: npx prisma migrate deploy

      - name: Run unit tests
        run: npm test

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5434 -U postgres -c 'CREATE DATABASE "somos-barrio-test";'

      - name: Apply migrations (test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/somos-barrio-test?schema=public

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/somos-barrio-test?schema=public
